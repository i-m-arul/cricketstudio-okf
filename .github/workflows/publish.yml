name: Publish OKF

# Builds the bundle manifest on merge to main. Viewer publishing and release artifacts
# are added in v0.3 (see docs/VIEWER_REQUIREMENTS.md); kept minimal until the schema and
# validation pipeline are proven stable.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: cricketstudio-okf-bundle
          path: |
            okf/**
            schema/**
            manifest.yaml
            README.md
            LICENSE.md
            ATTRIBUTION.md
            DATA_LICENSE_BOUNDARIES.md
