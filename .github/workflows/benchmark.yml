name: LLM Accuracy Benchmark

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      sample:
        description: 'Questions to sample (blank = full 1000)'
        required: false
        default: ''
      raw_only:
        description: 'Skip OKF context pass (true/false)'
        required: false
        default: 'false'
      v2:
        description: 'Use v2 benchmark with real cricket knowledge questions (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    environment: benchmark
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          BENCHMARK_COST_CAP: '100'
        run: |
          FLAGS=""
          if [ -n "${{ inputs.sample }}" ]; then
            FLAGS="$FLAGS --sample ${{ inputs.sample }}"
          fi
          if [ "${{ inputs.raw_only }}" = "true" ]; then
            FLAGS="$FLAGS --raw-only"
          fi
          if [ "${{ inputs.v2 }}" != "false" ]; then
            FLAGS="$FLAGS --v2"
          fi
          node scripts/run-benchmark.mjs $FLAGS

      - name: Commit results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "CricketStudio"
          git config user.email "github-actions@cricketstudio.ai"
          git add viewer/public/evals/leaderboard.json
          git add viewer/public/evals/results/ 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit." && exit 0

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="evals/benchmark-${DATE}"
          git checkout -b "${BRANCH}"

          MSG="chore(evals): weekly LLM accuracy benchmark

Co-Authored-By: i-m-arul <i-m-arul@users.noreply.github.com>
Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"

          git commit -m "$MSG"
          git push origin "${BRANCH}"
          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(evals): benchmark results ${DATE}" \
            --body "Automated weekly LLM accuracy benchmark results." \
            --label "automated" || echo "PR already exists"
          gh pr merge "${BRANCH}" --auto --squash || echo "Auto-merge queued"
