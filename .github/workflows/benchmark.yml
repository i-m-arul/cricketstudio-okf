name: LLM Accuracy Benchmark

on:
  schedule:
    - cron: '0 6 * * 1'   # Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      sample:
        description: 'Questions to sample (blank = full 1,000)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          BENCHMARK_COST_CAP: '50'
        run: |
          SAMPLE_FLAG=""
          if [ -n "${{ inputs.sample }}" ]; then
            SAMPLE_FLAG="--sample ${{ inputs.sample }}"
          fi
          node scripts/run-benchmark.mjs $SAMPLE_FLAG

      - name: Commit results
        run: |
          git config user.name "CricketStudio"
          git config user.email "github-actions@cricketstudio.ai"
          git add viewer/public/evals/leaderboard.json
          git add viewer/public/evals/results/ 2>/dev/null || true
          git diff --staged --quiet && echo "No changes to commit." && exit 0
          git commit -m "$(cat <<'EOF'
          chore(evals): weekly LLM accuracy benchmark

          Co-Authored-By: i-m-arul <i-m-arul@users.noreply.github.com>
          Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>
          EOF
          )"
          git push
