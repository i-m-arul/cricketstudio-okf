name: LLM Accuracy Benchmark

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      sample:
        description: 'Questions to sample (blank = full 1000)'
        required: false
        default: ''
      v2:
        description: 'Use v2 benchmark (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write
  pull-requests: write

jobs:
  gate:
    runs-on: ubuntu-latest
    environment: benchmark
    steps:
      - run: echo "Approved — starting benchmark run"

  benchmark:
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          BENCHMARK_COST_CAP: '100'
        run: |
          FLAGS="--v2"
          if [ -n "${{ inputs.sample }}" ]; then
            FLAGS="$FLAGS --sample ${{ inputs.sample }}"
          fi
          node scripts/run-benchmark.mjs $FLAGS

      - name: Commit results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "CricketStudio"
          git config user.email "github-actions@cricketstudio.ai"
          git add viewer/public/evals/leaderboard.json
          git diff --staged --quiet && echo "No changes." && exit 0
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(evals): benchmark results ${DATE}"
          git push origin HEAD:main
