name: cricketstudio-okf
version: 0.3.0
description: >-
  CricketStudio OKF — the Open Knowledge Framework for Cricket Data. A versioned
  standard and reference bundle built on Google OKF v0.1, defining a cricket type
  vocabulary, provenance convention, metric standard, claim discipline, identity
  rules, and sample-size doctrine. Includes a curated catalog of IPL and MLC
  cricket knowledge with 400+ files. Self-certified Level 2 (Evidence-Backed).
license: See LICENSE.md (docs CC-BY-4.0; data per source — see DATA_LICENSE_BOUNDARIES.md)
homepage: https://okf.cricketstudio.ai
repository: https://github.com/i-m-arul/cricketstudio-okf
okf_root: okf
schema: schema/frontmatter.schema.json
dataset_version: "2026-06-18"
source_systems:
  - CricketStudio

data_sources:
  - name: CricketStudio derived claim layer (IPL 2026)
    license: CC-BY-4.0 for derived claims
    boundary: derived_claims_only
    attribution: Derived from a licensed third-party data feed; raw feed not redistributed.
  - name: Cricsheet (IPL historical + MLC)
    license: CC-BY-3.0
    boundary: public_open_data
    attribution: Ball-by-ball data from Cricsheet (https://cricsheet.org), CC BY 3.0.

